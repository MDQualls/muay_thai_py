services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app                    # Hot reload — mounts source code into container
      - ./output:/app/output      # Generated card PNGs persist outside the container
      - ./data:/app/data          # SQLite database file persists outside the container
    env_file:
      - .env
    restart: unless-stopped
